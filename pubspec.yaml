name: pomodoro_windows
description: Display app for Pomodoro car wash — shows live runway schedule on Windows, Web, and Android.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: 3.13.0
  cloud_firestore: 5.6.4
  intl: ^0.20.2
  provider: 6.1.1
  window_manager: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo_main.png
